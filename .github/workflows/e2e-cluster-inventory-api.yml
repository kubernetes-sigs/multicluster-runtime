name: E2E - Cluster Inventory API Example

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: e2e-cluster-inventory-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cluster-inventory-api:
    name: Run cluster-inventory-api example
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
    - name: Calculate go version
      id: vars
      run: echo "go_version=$(make go-version)" >> $GITHUB_OUTPUT
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag=v6.4.0
      with:
        go-version: ${{ steps.vars.outputs.go_version }}
    - name: Set up kind
      uses: helm/kind-action@92086f6be054225fa813e0a4b13787fc9088faab # tag=v1.13.0
      with:
        install_only: true
        version: v0.31.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # tag=v3.12.0
    - name: Tool versions
      run: |
        docker version
        kind version
        kubectl version --client=true
        go version
    - name: Run e2e
      run: MAKEFLAGS="-s" make test-e2e-cluster-inventory-api
    - name: Cleanup kind clusters
      if: always()
      run: bash ./examples/cluster-inventory-api/down.sh
