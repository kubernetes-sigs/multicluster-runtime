name: E2E - Cluster Inventory API Example

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: e2e-cluster-inventory-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cluster-inventory-api:
    name: Run cluster-inventory-api example
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
    - name: Calculate go version
      id: vars
      run: echo "go_version=$(make go-version)" >> $GITHUB_OUTPUT
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag=v6.4.0
      with:
        go-version: ${{ steps.vars.outputs.go_version }}
    - name: Set up kind
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # tag=v1.14.0
      with:
        install_only: true
        version: v0.31.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # tag=v4.1.0
    - name: Tool versions
      run: |
        docker version
        kind version
        kubectl version --client=true
        go version
    - name: Run e2e
      run: MAKEFLAGS="-s" make test-e2e-cluster-inventory-api
    - name: Cleanup kind clusters
      if: always()
      run: bash ./examples/cluster-inventory-api/down.sh
